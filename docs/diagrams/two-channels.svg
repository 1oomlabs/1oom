<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowMesh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">loomlabs — two discovery channels</text>
  <text x="600" y="68" text-anchor="middle" font-size="14" fill="#6b7280">centralized anchor (KeeperHub track) + Gensyn AXL P2P mesh (Best Application of AXL track)</text>

  <!-- Channel 1 backdrop -->
  <rect x="40" y="100" width="540" height="500" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="60" y="128" font-size="13" font-weight="700" fill="#b45309" letter-spacing="1.5">CHANNEL 1 — CENTRALIZED ANCHOR</text>

  <!-- Channel 2 backdrop -->
  <rect x="620" y="100" width="540" height="500" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="640" y="128" font-size="13" font-weight="700" fill="#991b1b" letter-spacing="1.5">CHANNEL 2 — GENSYN AXL P2P MESH</text>

  <!-- ===================== Channel 1 nodes ===================== -->
  <!-- User -->
  <circle cx="160" cy="180" r="32" fill="#fff" stroke="#7c2d12" stroke-width="2"/>
  <text x="160" y="186" text-anchor="middle" font-size="14" font-weight="600" fill="#7c2d12">User</text>

  <!-- apps/web -->
  <rect x="80" y="240" width="200" height="64" rx="8" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="180" y="266" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">apps/web</text>
  <text x="180" y="284" text-anchor="middle" font-size="11" fill="#9a3412">Vite + React + wagmi</text>

  <!-- apps/api -->
  <rect x="80" y="350" width="200" height="64" rx="8" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="180" y="376" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">apps/api</text>
  <text x="180" y="394" text-anchor="middle" font-size="11" fill="#9a3412">Hono + Prisma</text>

  <!-- Postgres -->
  <rect x="80" y="460" width="140" height="56" rx="8" fill="#fff" stroke="#c2410c" stroke-width="2"/>
  <text x="150" y="482" text-anchor="middle" font-size="13" font-weight="600" fill="#7c2d12">Postgres</text>
  <text x="150" y="500" text-anchor="middle" font-size="11" fill="#9a3412">Supabase</text>

  <!-- KeeperHub -->
  <rect x="240" y="460" width="160" height="56" rx="8" fill="#fff" stroke="#c2410c" stroke-width="2"/>
  <text x="320" y="482" text-anchor="middle" font-size="13" font-weight="600" fill="#7c2d12">KeeperHub</text>
  <text x="320" y="500" text-anchor="middle" font-size="11" fill="#9a3412">job execution</text>

  <!-- Sepolia MarketplaceRegistry -->
  <rect x="370" y="240" width="200" height="64" rx="8" fill="#fff" stroke="#c2410c" stroke-width="2"/>
  <text x="470" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">MarketplaceRegistry</text>
  <text x="470" y="280" text-anchor="middle" font-size="11" fill="#9a3412">Sepolia 0x42Fb…09CB</text>
  <text x="470" y="294" text-anchor="middle" font-size="10" fill="#9a3412">verified onchain anchor</text>

  <!-- Channel 1 arrows -->
  <line x1="160" y1="212" x2="160" y2="240" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="120" y="232" font-size="11" fill="#374151">prompt</text>

  <line x1="180" y1="304" x2="180" y2="350" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="332" font-size="11" fill="#374151">REST</text>

  <line x1="150" y1="414" x2="150" y2="460" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="414" x2="290" y2="460" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- web -> Sepolia (dashed: wagmi.writeContract from wallet) -->
  <line x1="280" y1="272" x2="370" y2="272" stroke="#6b7280" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowDashed)"/>
  <text x="295" y="262" font-size="10" fill="#4b5563" font-style="italic">wagmi.writeContract</text>

  <!-- ===================== Channel 2 nodes ===================== -->
  <!-- Agent A -->
  <circle cx="720" cy="180" r="32" fill="#fff" stroke="#7f1d1d" stroke-width="2"/>
  <text x="720" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#7f1d1d">Agent A</text>

  <!-- Agent B -->
  <circle cx="1060" cy="180" r="32" fill="#fff" stroke="#7f1d1d" stroke-width="2"/>
  <text x="1060" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#7f1d1d">Agent B</text>

  <!-- AXL Node A -->
  <rect x="640" y="260" width="200" height="64" rx="8" fill="#fecaca" stroke="#b91c1c" stroke-width="2"/>
  <text x="740" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">AXL Node A</text>
  <text x="740" y="304" text-anchor="middle" font-size="11" fill="#991b1b">HTTP :9002 · ed25519 id</text>

  <!-- AXL Node B -->
  <rect x="940" y="260" width="200" height="64" rx="8" fill="#fecaca" stroke="#b91c1c" stroke-width="2"/>
  <text x="1040" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">AXL Node B</text>
  <text x="1040" y="304" text-anchor="middle" font-size="11" fill="#991b1b">HTTP :9012 · ed25519 id</text>

  <!-- Agent A -> Node A -->
  <line x1="720" y1="212" x2="720" y2="260" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="730" y="240" font-size="11" fill="#374151">POST /send</text>

  <!-- Node B -> Agent B -->
  <line x1="1060" y1="260" x2="1060" y2="212" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1070" y="240" font-size="11" fill="#374151">GET /recv</text>

  <!-- Mesh between Node A and Node B -->
  <path d="M 840 292 C 870 270, 910 270, 940 292" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowMesh)"/>
  <text x="890" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">yggdrasil mesh</text>
  <text x="890" y="276" text-anchor="middle" font-size="10" fill="#991b1b">end-to-end encrypted</text>

  <!-- envelope contents box -->
  <rect x="700" y="360" width="380" height="74" rx="8" fill="#fff" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="890" y="382" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">loomlabs.axl.v1 envelope</text>
  <text x="890" y="402" text-anchor="middle" font-size="11" fill="#374151">contentHash · uri · workflow snapshot</text>
  <text x="890" y="420" text-anchor="middle" font-size="10" fill="#6b7280">verified by SHA-256 before deploy</text>

  <!-- arrows from agents to envelope ref -->
  <line x1="800" y1="324" x2="850" y2="360" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="980" y1="324" x2="930" y2="360" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Agent B -> apps/api (cross-channel) -->
  <path d="M 1060 213 C 1060 530, 600 530, 280 470"
        fill="none" stroke="#374151" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowDashed)"/>
  <text x="640" y="555" text-anchor="middle" font-size="11" fill="#374151" font-style="italic">optional: POST /api/workflows · POST /api/marketplace (tag: axl-agent)</text>

  <!-- ===================== ElizaOS plugin band ===================== -->
  <rect x="40" y="630" width="1120" height="64" rx="10" fill="#1f2937"/>
  <text x="60" y="658" font-size="13" font-weight="700" fill="#f9fafb" letter-spacing="1">ElizaOS plugin</text>
  <text x="60" y="680" font-size="11" fill="#d1d5db">6 actions · dual-mode (dry-run + opt-in live)</text>

  <text x="220" y="655" font-size="11" fill="#fcd34d" font-weight="600">BROWSE_TEMPLATES</text>
  <text x="220" y="673" font-size="11" fill="#fcd34d" font-weight="600">DESCRIBE_TEMPLATE</text>
  <text x="220" y="691" font-size="11" fill="#fcd34d" font-weight="600">BROWSE_MARKETPLACE</text>

  <text x="430" y="655" font-size="11" fill="#fcd34d" font-weight="600">CREATE_WORKFLOW</text>
  <text x="430" y="673" font-size="11" fill="#fcd34d" font-weight="600">CREATE_WORKFLOW_LIVE</text>
  <text x="430" y="691" font-size="11" fill="#fcd34d" font-weight="600">CREATE_WORKFLOW_DEMO</text>

  <text x="660" y="655" font-size="11" fill="#fca5a5" font-weight="600">CHECK_AXL_NODE</text>
  <text x="660" y="673" font-size="11" fill="#fca5a5" font-weight="600">SEND_AXL_WORKFLOW_DRAFT</text>
  <text x="660" y="691" font-size="11" fill="#fca5a5" font-weight="600">RECEIVE_AXL_MESSAGES</text>

  <text x="900" y="655" font-size="11" fill="#fca5a5" font-weight="600">EXECUTE_RECEIVED_AXL_WORKFLOW</text>
  <text x="900" y="678" font-size="10" fill="#9ca3af" font-style="italic">verifies SHA-256 contentHash, then bridges to Loom API</text>

  <!-- Footer label -->
  <text x="40" y="730" font-size="11" fill="#6b7280">Channel 1 = KeeperHub track · Channel 2 = Gensyn AXL track · One ElizaOS plugin drives both.</text>
  <text x="1160" y="730" text-anchor="end" font-size="11" fill="#6b7280">github.com/1oomlabs/1oom</text>
</svg>
